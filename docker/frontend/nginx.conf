map $uri $pfh_cache_control {
    default "no-store";
    ~^/api/ "";
    ~^/assets/ "public, max-age=31536000, immutable";
}

upstream pfh_backend {
    server app:8080;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cache-Control $pfh_cache_control always;

    location /api/ {
        proxy_pass http://pfh_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Trace-Id $request_id;
    }

    location = /livez {
        proxy_pass http://pfh_backend/livez;
    }

    location = /readyz {
        proxy_pass http://pfh_backend/readyz;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
