# Flyway configuration for Personal Finance Hub (PFH)
# Usage:
#   flyway migrate     - Apply pending migrations
#   flyway info        - Show migration status
#   flyway validate    - Validate applied migrations match source
#   flyway repair      - Mark failed migrations as resolved (use with caution)
#   flyway clean       - Drop all objects (DANGEROUS; dev only)

# Database connection (override via environment variables in production)
flyway.url=jdbc:postgresql://localhost:5432/pfh_dev
flyway.user=pfh_user
flyway.password=${FLYWAY_PASSWORD}

# Migration scripts location
flyway.locations=filesystem:./migrations

# Apply baseline to existing database at V1
flyway.baselineOnMigrate=true
flyway.baselineVersion=1

# Validate checksums on migrate
flyway.validateOnMigrate=true

# Allow out-of-order migrations in development (set false in production)
flyway.outOfOrder=false

# Schema history table (default: flyway_schema_history)
flyway.table=flyway_schema_history

# Placeholder replacement (optional; e.g., ${app_version})
flyway.placeholderReplacement=false

# Encoding
flyway.encoding=UTF-8

# SQL migration separator (default: ;)
flyway.sqlMigrationSeparator=;

# Fail fast on validation error
flyway.cleanDisabled=true
